name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# 同一PRの連続pushでは古い実行をキャンセルする
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # PRのオープン/更新時: draft記事も含めたプレビューバージョンをアップロードしてURLをコメントする
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "Build（プレビュー: draft記事も出力する）"
        run: pnpm build
        env:
          PREVIEW_MODE: "true"
      - name: Upload preview version to Cloudflare Workers
        id: upload
        run: |
          OUTPUT=$(pnpm exec wrangler versions upload 2>&1)
          echo "$OUTPUT"
          # ANSIエスケープを除去した上でプレビューURL（*.workers.dev）を抽出する
          URL=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' \
            | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -n1)
          if [ -z "$URL" ]; then
            echo "::error::プレビューURLを取得できませんでした" >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment preview URL
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const url = ${{ toJSON(steps.upload.outputs.url) }};
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              '### 🔎 プレビュー',
              '',
              `draft記事も含めたプレビューをアップロードしました（commit \`${sha}\`）。`,
              '',
              `👉 ${url}`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number },
            );
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

  # PRのクローズ/マージ時: プレビューコメントを終了状態に更新する
  # （versions upload は個別バージョンの削除CLIがなく、古いバージョンはCloudflare側で自動失効する）
  close-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Mark preview as closed
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number },
            );
            const existing = comments.find((c) => c.body.includes(marker));
            if (!existing) return;
            const body = [
              marker,
              '### 🔎 プレビュー',
              '',
              'このPRはクローズされたためプレビューは終了しました。',
              'アップロード済みのプレビューバージョンはCloudflare側で自動失効します。',
            ].join('\n');
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
