name: Scheduled Rebuild

on:
  # Daily at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger deploy workflow
        run: |
          gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
